lecture:
  id: lecture05
  order: 5
  title: 'Role 분리와 재사용 설계'
  module: ansible_foundation
  level: beginner
  duration_minutes: 60
  tags:
  - ansible
  - role
  - reuse
prerequisites:
- lecture04 완료
- Linux 기본 명령어(ls, cat, systemctl) 사용 가능
learning_objectives:
- role 구조(tasks/defaults/handlers/templates) 책임을 분리한다.
- 같은 role을 여러 환경에서 재사용하는 변수 설계를 익힌다.
- 역할별 테스트 포인트를 정의한다.
curriculum:
  session_flow:
  - 오프닝 10분: 목표/검증 기준 확인
  - 핵심 실습 40분: playbook 실행 및 결과 검증
  - 회고 10분: 로그 정리와 다음 강의 연결
tech_stack:
  required:
  - ansible-core
  - python3
  - yaml
  optional:
  - docker
  - openstack
installation_plan:
  target_inventory: ../ansible/inventories/local/hosts.ini
  target_host_group: all
  approach:
  - install_enabled=true일 때 패키지 설치 태스크를 수행
  - install_enabled=false일 때는 검증 태스크만 수행
  packages:
  - python3
  - python3-pip
  - git
  - curl
  - jq
ansible_lab:
  lecture_playbook: ./playbook.yml
  reference_playbook: ../ansible/playbooks/03_role_web.yml
  run_examples:
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=false
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=true
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ../ansible/playbooks/03_role_web.yml
