---
- name: "Ad-hoc 명령과 Facts 수집 자동화"
  hosts: all
  become: true
  gather_facts: true
  vars:
    lecture_id: "lecture03"
    lecture_title: "Ad-hoc 명령과 Facts 수집 자동화"
    install_enabled: false
    reference_playbook: "../ansible/playbooks/learning/01_ping.yml"
    lecture_packages:
      - python3
      - python3-pip
      - git
      - curl
      - jq
  tasks:
    - name: Show lecture context
      ansible.builtin.debug:
        msg:
          - "id={{ lecture_id }}"
          - "title={{ lecture_title }}"
          - "reference_playbook={{ reference_playbook }}"
          - "install_enabled={{ install_enabled }}"

    - name: Install lecture packages when enabled
      ansible.builtin.package:
        name: "{{ lecture_packages }}"
        state: present
      when: install_enabled | bool

    - name: Check Python3 availability
      ansible.builtin.command: python3 --version
      register: python_version
      changed_when: false
      failed_when: false

    - name: Print Python3 version
      ansible.builtin.debug:
        var: python_version.stdout

    - name: Show gathered server resource facts
      ansible.builtin.debug:
        msg:
          - "hostname={{ ansible_facts.hostname }}"
          - "os={{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }}"
          - "kernel={{ ansible_facts.kernel }}"
          - "cpu_vcpus={{ ansible_facts.processor_vcpus | default('unknown') }}"
          - "memory_mb={{ ansible_facts.memtotal_mb | default('unknown') }}"
          - "root_mount_size_mb={{ ((ansible_facts.mounts | selectattr('mount', 'equalto', '/') | map(attribute='size_total') | first | default(0)) / 1024 / 1024) | int }}"
          - "root_mount_free_mb={{ ((ansible_facts.mounts | selectattr('mount', 'equalto', '/') | map(attribute='size_available') | first | default(0)) / 1024 / 1024) | int }}"
