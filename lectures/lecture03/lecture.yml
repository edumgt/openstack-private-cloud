lecture:
  id: lecture03
  order: 3
  title: 'Ad-hoc 명령과 Facts 수집 자동화'
  module: ansible_foundation
  level: beginner
  duration_minutes: 60
  tags:
  - ansible
  - adhoc
  - facts
prerequisites:
- lecture02 완료
- Linux 기본 명령어(ls, cat, systemctl) 사용 가능
learning_objectives:
- Ad-hoc 명령과 playbook 실행의 차이를 이해한다.
- facts 수집 결과를 진단/분기 로직에 활용하는 방법을 익힌다.
- 실패 시 원인-증상-조치 순서의 점검 루틴을 만든다.
curriculum:
  session_flow:
  - 오프닝 10분: 목표/검증 기준 확인
  - 핵심 실습 40분: playbook 실행 및 결과 검증
  - 회고 10분: 로그 정리와 다음 강의 연결
tech_stack:
  required:
  - ansible-core
  - python3
  - yaml
  optional:
  - docker
  - openstack
installation_plan:
  target_inventory: ../ansible/inventories/local/hosts.ini
  target_host_group: all
  approach:
  - install_enabled=true일 때 패키지 설치 태스크를 수행
  - install_enabled=false일 때는 검증 태스크만 수행
  packages:
  - python3
  - python3-pip
  - git
  - curl
  - jq
ansible_lab:
  lecture_playbook: ./playbook.yml
  reference_playbook: ../ansible/playbooks/learning/01_ping.yml
  run_examples:
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=false
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=true
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ../ansible/playbooks/learning/01_ping.yml
