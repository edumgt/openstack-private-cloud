lecture:
  id: lecture04
  order: 4
  title: 'Jinja2 템플릿과 Handler 실전'
  module: ansible_foundation
  level: beginner
  duration_minutes: 60
  tags:
  - ansible
  - jinja2
  - handler
prerequisites:
- lecture03 완료
- Linux 기본 명령어(ls, cat, systemctl) 사용 가능
learning_objectives:
- Jinja2 템플릿 변수 바인딩 패턴을 익힌다.
- 변경이 있을 때만 handler가 동작하는 구조를 이해한다.
- 템플릿 파일과 역할(role) 구조의 연결 방식을 학습한다.
curriculum:
  session_flow:
  - 오프닝 10분: 목표/검증 기준 확인
  - 핵심 실습 40분: playbook 실행 및 결과 검증
  - 회고 10분: 로그 정리와 다음 강의 연결
tech_stack:
  required:
  - ansible-core
  - python3
  - yaml
  optional:
  - docker
  - openstack
installation_plan:
  target_inventory: ../ansible/inventories/local/hosts.ini
  target_host_group: all
  approach:
  - install_enabled=true일 때 패키지 설치 태스크를 수행
  - install_enabled=false일 때는 검증 태스크만 수행
  packages:
  - python3
  - python3-pip
  - git
  - curl
  - jq
ansible_lab:
  lecture_playbook: ./playbook.yml
  reference_playbook: ../ansible/playbooks/learning/04_template_handler.yml
  run_examples:
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=false
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=true
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ../ansible/playbooks/learning/04_template_handler.yml
