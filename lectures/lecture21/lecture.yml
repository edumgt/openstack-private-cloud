lecture:
  id: lecture21
  order: 21
  title: 'OpenStack/Nova 기본 점검'
  module: openstack_operations
  level: intermediate
  duration_minutes: 30
  tags:
  - openstack
  - nova
  - cli
  - validation
  - codespaces
prerequisites:
- lecture22 완료
- OpenStack 인증 정보 또는 mock openrc 준비
- Linux 기본 명령어(ls, cat, systemctl) 사용 가능
learning_objectives:
- OpenStack CLI의 기본 연결 상태를 점검한다.
- Nova 서비스 목록과 하이퍼바이저 상태를 빠르게 확인한다.
- 인증 실패와 서비스 장애 출력을 구분해 읽는다.
- compute1, compute2에 Ansible로 nginx를 배포한다.
- 80 포트 HTTP 응답으로 배포 결과를 검증한다.
curriculum:
  session_flow:
  - 오프닝 5분: 인증 정보와 목표 확인
  - 핵심 실습 20분: playbook 실행 및 nginx 배포 결과 검토
  - 회고 5분: 실패 원인과 다음 점검 항목 정리
tech_stack:
  required:
  - ansible-core
  - python3
  - python-openstackclient
  - yaml
  optional:
  - openstack
  - nova
  - codespaces
installation_plan:
  target_inventory: ../ansible/inventories/local/hosts.ini
  target_host_group: all
  approach:
  - install_enabled=true일 때 workspace venv에 Python 패키지를 설치
  - install_enabled=false일 때는 인증과 Nova 조회를 점검
  packages:
  - ansible-core
  - python-openstackclient
ansible_lab:
  lecture_playbook: ./playbook.yml
  reference_playbook: ../ansible/playbooks/00_ping.yml
  run_examples:
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=false
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=true
