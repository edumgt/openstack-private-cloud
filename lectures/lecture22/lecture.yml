lecture:
  id: lecture22
  order: 22
  title: 'Codespaces용 Keystone/Nova Mock 준비'
  module: openstack_operations
  level: intermediate
  duration_minutes: 30
  tags:
  - openstack
  - keystone
  - nova
  - codespaces
  - mock
prerequisites:
- lecture21 이해
- GitHub Codespaces 또는 devcontainer 사용 가능
learning_objectives:
- Codespaces에서 OpenStack CLI 실습 환경을 준비한다.
- mock Keystone/Nova API를 실행한다.
- lecture21에서 재사용할 인증 환경 파일을 생성한다.
curriculum:
  session_flow:
  - 오프닝 5분: 실습 구조와 목표 확인
  - 핵심 실습 20분: mock 환경 구성과 인증 확인
  - 회고 5분: lecture21 연동 점검
tech_stack:
  required:
  - ansible-core
  - python3
  - python-openstackclient
  - yaml
  optional:
  - devcontainer
  - codespaces
installation_plan:
  target_inventory: ../ansible/inventories/local/hosts.ini
  target_host_group: all
  approach:
  - install_enabled=true일 때 workspace venv에 Python 패키지를 설치
  - 항상 mock 서버와 openrc 파일을 준비
  packages:
  - ansible-core
  - python-openstackclient
ansible_lab:
  lecture_playbook: ./playbook.yml
  reference_playbook: ../ansible/playbooks/00_ping.yml
  run_examples:
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=true
  - source ../.lab/keystone-admin-openrc && ansible-playbook -i ../ansible/inventories/local/hosts.ini ../lecture21/playbook.yml -e install_enabled=false
