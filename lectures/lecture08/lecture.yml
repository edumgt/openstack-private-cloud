lecture:
  id: lecture08
  order: 8
  title: 'Nginx 서비스 배포와 검증'
  module: ansible_operations
  level: beginner
  duration_minutes: 60
  tags:
  - ansible
  - nginx
  - service
prerequisites:
- lecture07 완료
- Linux 기본 명령어(ls, cat, systemctl) 사용 가능
learning_objectives:
- Nginx 설치/설정/상태 확인 절차를 자동화한다.
- 서비스 배포 후 헬스체크 기준을 학습한다.
- 구성 변경 시 rollback 관점을 정리한다.
curriculum:
  session_flow:
  - 오프닝 10분: 목표/검증 기준 확인
  - 핵심 실습 40분: playbook 실행 및 결과 검증
  - 회고 10분: 로그 정리와 다음 강의 연결
tech_stack:
  required:
  - ansible-core
  - python3
  - yaml
  optional:
  - docker
  - openstack
installation_plan:
  target_inventory: ../ansible/inventories/local/hosts.ini
  target_host_group: all
  approach:
  - install_enabled=true일 때 패키지 설치 태스크를 수행
  - install_enabled=false일 때는 검증 태스크만 수행
  packages:
  - python3
  - python3-pip
  - git
  - curl
  - jq
  - nginx
ansible_lab:
  lecture_playbook: ./playbook.yml
  reference_playbook: ../ansible/playbooks/02_nginx.yml
  run_examples:
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=false
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=true
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ../ansible/playbooks/02_nginx.yml
