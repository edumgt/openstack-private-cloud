lecture:
  id: lecture19
  order: 19
  title: '실제 OpenStack 클라이언트 환경 준비'
  module: openstack_operations
  level: intermediate
  duration_minutes: 60
  tags:
  - openstack
  - openstack-client
  - devstack
  - openrc
  - clouds-yaml
prerequisites:
- lecture18 완료
- Linux 기본 명령어(ls, cat, systemctl) 사용 가능
- 실제 OpenStack API 또는 DevStack 설치 대상 Ubuntu 서버 준비
learning_objectives:
- 실제 OpenStack API에 연결할 클라이언트 환경을 준비한다.
- openrc와 clouds.yaml을 생성한다.
- 별도 Ubuntu 서버에 DevStack을 올릴 수 있도록 사전 준비를 수행한다.
- OpenStack CLI로 토큰 발급 테스트를 수행한다.
external_reference:
- 'https://docs.openstack.org/python-openstackclient/latest/'
curriculum:
  session_flow:
  - 오프닝 10분: 목표/검증 기준 확인
  - 핵심 실습 40분: playbook 실행 및 결과 검증
  - 회고 10분: 로그 정리와 다음 강의 연결
tech_stack:
  required:
  - ansible-core
  - python3
  - yaml
  optional:
  - docker
  - openstack
  - kubectl
  - helm
installation_plan:
  target_inventory: ../ansible/inventories/local/hosts.ini
  target_host_group: all
  approach:
  - install_enabled=true일 때 패키지 설치 태스크를 수행
  - install_enabled=false일 때는 검증 태스크만 수행
  packages:
  - python3
  - python3-pip
  - git
  - curl
  - jq
  - docker.io
  - apt-transport-https
  - ca-certificates
ansible_lab:
  lecture_playbook: ./playbook.yml
  reference_playbook: ../ansible/playbooks/10_docker_engine_install.yml
  run_examples:
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=false
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=true
  - ansible-playbook -i ../ansible/inventories/dev/hosts.ini ../ansible/playbooks/30_devstack_host_prep.yml -l openstack_hosts
