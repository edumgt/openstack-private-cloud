lecture:
  id: lecture24
  order: 24
  title: 'Octavia Load Balancer 점검'
  module: openstack_operations
  level: intermediate
  duration_minutes: 50
  tags:
  - openstack
  - octavia
  - load-balancer
  - lbaas
  - ha
prerequisites:
- lecture21 완료
- OpenStack 인증 정보 준비
- Neutron 네트워크 존재
- Linux 기본 명령어 사용 가능
learning_objectives:
- Octavia Load Balancer as a Service 개념을 이해한다.
- 두 compute를 하나의 진입점으로 묶는 방법을 학습한다.
- Load Balancer, Listener, Pool, Member 구조를 이해한다.
- Health Monitor로 자동 장애 조치를 구성한다.
external_reference:
- 'https://docs.openstack.org/octavia/latest/'
curriculum:
  session_flow:
  - 오프닝 5분: Load Balancer 개념과 사용 사례
  - 핵심 실습 40분: LB 생성 및 트래픽 분산 테스트
  - 회고 5분: HA 구성과 자동 장애 조치 정리
tech_stack:
  required:
  - ansible-core
  - python3
  - python-openstackclient
  - yaml
  optional:
  - octavia
  - python-octaviaclient
installation_plan:
  target_inventory: ../ansible/inventories/local/hosts.ini
  target_host_group: all
  approach:
  - install_enabled=true일 때 Octavia 클라이언트 패키지 설치
  - Octavia 서비스가 없을 때는 개념만 확인
  packages:
  - python3
  - python-openstackclient
  - python-octaviaclient
ansible_lab:
  lecture_playbook: ./playbook.yml
  reference_playbook: ../ansible/playbooks/00_ping.yml
  run_examples:
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=false -e openrc_path=../.lab/real-openstack-openrc -e use_mock_openstack_auth=false
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=false -e octavia_service_available=false
