lecture:
  id: lecture10
  order: 10
  title: 'Compose 배포와 업데이트 전략'
  module: ansible_operations
  level: intermediate
  duration_minutes: 60
  tags:
  - ansible
  - compose
  - deploy
prerequisites:
- lecture09 완료
- Linux 기본 명령어(ls, cat, systemctl) 사용 가능
learning_objectives:
- Compose 기반 멀티서비스 배포 흐름을 이해한다.
- 업데이트 전략(rolling/blue-green) 연결 포인트를 학습한다.
- 배포 후 검증/롤백 기준을 정리한다.
curriculum:
  session_flow:
  - 오프닝 10분: 목표/검증 기준 확인
  - 핵심 실습 40분: playbook 실행 및 결과 검증
  - 회고 10분: 로그 정리와 다음 강의 연결
tech_stack:
  required:
  - ansible-core
  - python3
  - yaml
  optional:
  - docker
  - openstack
installation_plan:
  target_inventory: ../ansible/inventories/local/hosts.ini
  target_host_group: all
  approach:
  - install_enabled=true일 때 패키지 설치 태스크를 수행
  - install_enabled=false일 때는 검증 태스크만 수행
  packages:
  - python3
  - python3-pip
  - git
  - curl
  - jq
  - docker.io
ansible_lab:
  lecture_playbook: ./playbook.yml
  reference_playbook: ../ansible/playbooks/11_deploy_stack.yml
  run_examples:
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=false
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=true
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ../ansible/playbooks/11_deploy_stack.yml
