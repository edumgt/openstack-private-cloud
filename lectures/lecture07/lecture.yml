lecture:
  id: lecture07
  order: 7
  title: '사용자/권한/SSH 정책 자동화'
  module: ansible_operations
  level: beginner
  duration_minutes: 60
  tags:
  - ansible
  - security
  - ssh
prerequisites:
- lecture06 완료
- Linux 기본 명령어(ls, cat, systemctl) 사용 가능
learning_objectives:
- 서버 계정/권한/SSH 정책 표준화를 자동화한다.
- 운영 보안 기본 정책을 playbook 태스크로 정의한다.
- 권한 변경 시 검증 포인트를 정리한다.
curriculum:
  session_flow:
  - 오프닝 10분: 목표/검증 기준 확인
  - 핵심 실습 40분: playbook 실행 및 결과 검증
  - 회고 10분: 로그 정리와 다음 강의 연결
tech_stack:
  required:
  - ansible-core
  - python3
  - yaml
  optional:
  - docker
  - openstack
installation_plan:
  target_inventory: ../ansible/inventories/local/hosts.ini
  target_host_group: all
  approach:
  - install_enabled=true일 때 패키지 설치 태스크를 수행
  - install_enabled=false일 때는 검증 태스크만 수행
  packages:
  - python3
  - python3-pip
  - git
  - curl
  - jq
ansible_lab:
  lecture_playbook: ./playbook.yml
  reference_playbook: ../ansible/playbooks/01_users.yml
  run_examples:
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=false
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=true
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ../ansible/playbooks/01_users.yml
