lecture:
  id: lecture18
  order: 18
  title: 'Horizon 운영 점검과 로그 수집'
  module: openstack_operations
  level: intermediate
  duration_minutes: 60
  tags:
  - openstack
  - horizon
  - ops
prerequisites:
- lecture17 완료
- Linux 기본 명령어(ls, cat, systemctl) 사용 가능
learning_objectives:
- Horizon 화면과 백엔드 상태를 연결해 점검한다.
- 운영 로그 수집 기준과 장애 1차 진단 절차를 만든다.
- API 기반 상태 확인 루틴을 정리한다.
curriculum:
  session_flow:
  - 오프닝 10분: 목표/검증 기준 확인
  - 핵심 실습 40분: playbook 실행 및 결과 검증
  - 회고 10분: 로그 정리와 다음 강의 연결
tech_stack:
  required:
  - ansible-core
  - python3
  - yaml
  optional:
  - docker
  - openstack
installation_plan:
  target_inventory: ../ansible/inventories/local/hosts.ini
  target_host_group: all
  approach:
  - install_enabled=true일 때 패키지 설치 태스크를 수행
  - install_enabled=false일 때는 검증 태스크만 수행
  packages:
  - python3
  - python3-pip
  - git
  - curl
  - jq
ansible_lab:
  lecture_playbook: ./playbook.yml
  reference_playbook: ../ansible/playbooks/aws_outputs.yml
  run_examples:
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=false
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ./playbook.yml -e install_enabled=true
  - ansible-playbook -i ../ansible/inventories/local/hosts.ini ../ansible/playbooks/aws_outputs.yml
