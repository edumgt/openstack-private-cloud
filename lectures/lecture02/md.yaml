---
- name: "Create abcdef directory in current lecture folder"
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    target_dir: "{{ playbook_dir }}/abcdef"

  tasks:
    - name: Create abcdef directory
      ansible.builtin.file:
        path: "{{ target_dir }}"
        state: directory
        mode: "0755"

    - name: Show created directory
      ansible.builtin.debug:
        msg: "Created directory: {{ target_dir }}"
